[manager]
sort_by = "natural"
sort_dir_first = true
linemode = "size"
show_hidden = true
scrolloff = 5

[plugin]
prepend_previewers = [
    { url = "*.md", run = "glow" },
    { mime = "text/csv", run = "miller" },
]
prepend_fetchers = [
    { url = "*", run = "git", group = "git" },
    { url = "*/", run = "git", group = "git" },
]
