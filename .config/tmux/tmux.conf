# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."
bind R refresh-client -S \; display-message "Status bar refreshed..."

set-option -g default-shell /opt/homebrew/bin/fish

# enable color for tmux in Windows Terminal
set-option -g default-terminal 'xterm-256color'
set -ga terminal-overrides ',*256col*:Tc'
# undercurl, underscore
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# enable mouse
set -g mouse on

# clipboard for nested tmux
set -g set-clipboard on

# theme
source-file ~/.config/tmux/tmux.conf.rose-pine
# source-file ~/.config/tmux/tmux.conf.nightfox
# source-file ~/.config/tmux/tmux.conf.kanagawa
# source-file ~/.config/tmux/tmux.conf.tokyonight

# neovim: ESC in tmux is delayed
set -sg escape-time 10

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix M-a
bind-key C-a send-prefix

# move between panes
unbind-key M-h
unbind-key M-l
bind -n M-h previous-window
bind -n M-l next-window
# Opt+Shift+h/j/k/l: seamless focus across herdr (inner) + tmux (outer) — if the
# active pane runs herdr and has a pane that way, move within herdr; else move
# between tmux panes. tmux drives herdr via its CLI socket (needs jq + herdr CLI).
bind -n M-H run-shell '~/.config/tmux/herdr-tmux-nav.sh left  L "#{pane_current_command}"'
bind -n M-J run-shell '~/.config/tmux/herdr-tmux-nav.sh down  D "#{pane_current_command}"'
bind -n M-K run-shell '~/.config/tmux/herdr-tmux-nav.sh up    U "#{pane_current_command}"'
bind -n M-L run-shell '~/.config/tmux/herdr-tmux-nav.sh right R "#{pane_current_command}"'

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# swap pane
bind M swap-pane

# reorder windows
bind Left swap-window -d -t -1
bind Right swap-window -d -t +1
unbind-key M-Left
unbind-key M-Right
unbind M-Left
unbind M-Right
bind -n M-<   swap-window -d -t -1
bind -n M->  swap-window -d -t +1

# vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key P paste-buffer
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle \; send -X begin-selection

# resize
bind -n M-+ resize-pane -U 5
bind -n M-_ resize-pane -D 5
bind -n M-- resize-pane -L 5
bind -n M-= resize-pane -R 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'jimeh/tmux-themepack'  # disabled: its default 'basic' theme overrode the nightfox status bar
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g status-right 'Continuum status: #{continuum_status}'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

# History
set -g history-file ~/.tmux_history

set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key Space

# tmux-fuzzback
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind f

# tmux-jump
set -g @plugin 'schasse/tmux-jump'
set -g @jump-key /

# yazi's image preview + Claude Code: passthrough for notifications/progress bar
set -g allow-passthrough on
# Claude Code: distinguish Shift+Enter from plain Enter
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# copy mode keys
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# load modular tmux config files
# source-file ~/.config/tmux/tmux.conf.something



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
