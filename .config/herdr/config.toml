onboarding = false
[ui]
agent_panel_scope = "all"

agent_panel_sort = "priority"
[keys]
# prefix-free Ctrl+Shift+h/l: previous/next tab (keeps default prefix+n/p too)
previous_tab = ["prefix+p", "ctrl+shift+h"]
next_tab = ["prefix+n", "ctrl+shift+l"]

# detach moved off prefix+d (now hunk) → prefix+ctrl+d keeps the "d" mnemonic.
detach = "prefix+ctrl+d"

# prefix+g launches lazygit in a vertical split (see [[keys.command]] at the
# bottom); to free it, goto moves prefix+g -> prefix+s, and the workspace
# ("spaces") picker moves prefix+s -> prefix+w (its default). settings stays on
# prefix+shift+s.
goto = "prefix+s"
workspace_picker = "prefix+w"
settings = "prefix+shift+s"

# vim-style j/k move the selection up/down inside the spaces picker
# (frees pane up/down in navigate mode; use arrows or ctrl+b j/k for pane focus)
navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_up = ""
navigate_pane_down = ""

# next / previous agent in the panel
# - prefix-free Opt+Shift+n/p (Ghostty macos-option-as-alt=true sends Option as
#   Alt, so alt+… reaches herdr)
# - prefix-free Ctrl+Shift+j/k (vim-style: j=down=next, k=up=previous)
next_agent = ["alt+shift+n", "ctrl+shift+j"]
previous_agent = ["alt+shift+p", "ctrl+shift+k"]

# next / previous space (workspace) — prefix-free Opt+j/k
# Opt+j/k mirror vim down/next & up/previous
next_workspace = "alt+j"
previous_workspace = "alt+k"

# leader+a focuses the agent panel for keyboard browsing
# (j/k to move, enter to jump, esc to leave) — needs the rebuilt binary
agent_picker = "prefix+a"

# prefix-free: Opt+Shift+h/j/k/l focus panes directly (keeps default prefix+h/j/k/l too)
focus_pane_left = ["prefix+h", "alt+shift+h"]
focus_pane_down = ["prefix+j", "alt+shift+j"]
focus_pane_up = ["prefix+k", "alt+shift+k"]
focus_pane_right = ["prefix+l", "alt+shift+l"]

# split_vertical moved off prefix+v (now nvim) → prefix+| (mnemonic: | looks like
# a vertical divider). split_horizontal stays on its default prefix+minus.
split_vertical = "prefix+|"

[ui.toast]
delivery = "herdr"

# prefix+g: open lazygit in a vertical split (to the right) of the focused pane,
# in that pane's cwd. The helper resolves the focused pane over the socket,
# splits it, and runs `lazygit; exit` so the pane auto-closes when you quit.
# If the cwd isn't a git repo, it toasts "Not a git repository" and skips the split.
[[keys.command]]
key = "prefix+g"
type = "shell"
command = "~/.config/herdr/herdr-lazygit.sh"
description = "lazygit — vertical split, focused pane cwd"

# prefix+y: open yazi in a horizontal split (below) the focused pane,
# in that pane's cwd. The helper resolves the focused pane over the socket,
# splits it, and runs `yazi; exit` so the pane auto-closes when you quit.
# (Moved off prefix+f, which now branches the Claude conversation.)
[[keys.command]]
key = "prefix+y"
type = "shell"
command = "~/.config/herdr/herdr-yazi.sh"
description = "yazi — horizontal split, focused pane cwd"

# prefix+f: branch (fork) the focused pane's Claude Code conversation into a new
# focused tab, in that pane's cwd. The helper reads the pane's Claude session ID
# over the socket and runs `claude --resume <id> --fork-session`, so the original
# session is untouched and the new tab explores an independent branch. Toasts and
# skips if the focused pane has no Claude session.
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "~/.config/herdr/herdr-claude-branch.sh"
description = "claude branch — fork this conversation into a new tab"

# prefix+v: open nvim in a new (focused) tab, in the focused pane's cwd. The
# helper resolves the focused pane over the socket, creates a tab, and runs
# `nvim; exit` so the tab auto-closes when you quit. (Moved off prefix+t;
# split_vertical moved to prefix+| to free this key.)
[[keys.command]]
key = "prefix+v"
type = "shell"
command = "~/.config/herdr/herdr-nvim.sh"
description = "nvim — new tab, focused pane cwd"

# prefix+shift+g: fzf-pick a top-level git repo under ~/dev and launch lazygit in
# it, in a vertical split (to the right) of the focused pane. The helper resolves
# the focused pane over the socket, splits it, and runs the picker inside the new
# pane; selecting a repo runs $LAUNCH (default "lazygit"). Overrides herdr's
# default new_worktree binding on this key. Set HERDR_REPO_ROOT / HERDR_REPO_LAUNCH
# in the script to change the scan root or launched tool.
[[keys.command]]
key = "prefix+shift+g"
type = "shell"
command = "~/.config/herdr/herdr-repo-picker.sh"
description = "repo picker — fzf ~/dev git repos, launch lazygit in split"

# prefix+d: open hunk (diff review TUI) in a vertical split (to the right) of the
# focused pane, in that pane's cwd. Runs `hunk diff; exit` so the pane auto-closes
# when you quit; watch=true in ~/.config/hunk/config.toml keeps the diff live
# while an agent edits. Toasts and skips if not a git repo. (Moved off prefix+u;
# detach moved to prefix+ctrl+d to free this key.)
[[keys.command]]
key = "prefix+d"
type = "shell"
command = "~/.config/herdr/herdr-hunk.sh"
description = "hunk — diff review, vertical split, focused pane cwd"

# prefix+shift+d: fzf-pick a top-level git repo under ~/dev and launch hunk (diff
# review) in it, in a vertical split. Same helper as prefix+shift+g, just passing
# "hunk diff" instead of the default lazygit. Overrides herdr's default
# close_workspace binding on this key.
[[keys.command]]
key = "prefix+shift+d"
type = "shell"
command = "~/.config/herdr/herdr-repo-picker.sh 'hunk diff'"
description = "repo picker — fzf ~/dev git repos, launch hunk in split"
